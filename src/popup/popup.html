<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article → Obsidian</title>
    <style>
      :root {
        --accent: #5b5ef6;
        --accent-hover: #4a4dec;
        --bg: #ffffff;
        --text: #0f1419;
        --muted: #536471;
        --border: #e1e8ed;
      }
      * {
        box-sizing: border-box;
      }
      body {
        width: 300px;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Hiragino Sans", Meiryo, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      header {
        padding: 14px 16px;
        background: var(--accent);
        color: #fff;
      }
      header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
      }
      header p {
        margin: 2px 0 0;
        font-size: 11px;
        opacity: 0.9;
      }
      main {
        padding: 14px 16px;
      }
      #status {
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 12px;
        min-height: 16px;
      }
      #status.ok {
        color: #15803d;
      }
      #status.error {
        color: #b91c1c;
      }
      button.primary {
        width: 100%;
        padding: 11px;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        background: var(--accent);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.12s ease;
      }
      button.primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.primary:hover:not(:disabled) {
        background: var(--accent-hover);
      }
      .footer {
        margin-top: 12px;
        text-align: center;
      }
      .footer a {
        font-size: 11px;
        color: var(--accent);
        text-decoration: none;
        cursor: pointer;
      }
      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Article → Obsidian</h1>
      <p>X・noteの記事をMarkdownで保存します</p>
    </header>
    <main>
      <p id="status">ページを確認中…</p>
      <button id="saveBtn" class="primary" disabled>Obsidianに保存</button>
      <div class="footer">
        <a id="optionsLink">⚙ 設定を開く</a>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
